name: AWG Policy Cloud Build

on:
  workflow_dispatch:
  schedule:
    # 18:17 UTC = 21:17 MSK. Build and Pages deployment run in advance:
    # RouterOS imports force daily at 04:20 MSK and full chunks every 3 days at 04:40 MSK.
    - cron: "17 18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: awg-policy-cloud
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build cloud policy artifacts
        shell: pwsh
        run: |
          ./tools/build-cloud-policy.ps1 -Kind all -OutDir ./cloud-artifacts -CacheDir ./opencck-generated

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./cloud-artifacts

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
